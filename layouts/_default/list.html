{{ define "main" }}
<div class="list">
  {{ range .Pages.GroupByDate "2006" }}
  <h2 class="yearlist">{{ .Key }}</h2>

    {{ range .Pages }}
    <article class="postlist">
      <a class="postlist-title" href="{{ .RelPermalink }}" aria-label="{{ .Title }}">{{ .Title }}</a>
      <time class="postlist-meta" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
      {{ with .Summary }}<p class="postlist-summary">{{ . }}</p>{{ end }}
      {{ if .Truncated }}
      <a class="postlist-readmore" href="{{ .RelPermalink }}">Read more…</a>
      {{ end }}
    </article>
    {{ end }}

  {{ end }}
</div>
{{ end }}
